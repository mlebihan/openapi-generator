    DigitalIdentity:
      allOf:
        - $ref: '#/components/schemas/Entity'
        - type: object
          description: >-
            DigitalIdentity is a class that allow to describe a digital identity for an individual
            or a resource or a specific party role or a specific resource role. One of these four
            MUST be provided. If an individual or resource is provided, this identity will be for
            all her/his/its party roles or resource roles. To avoid confusion it is recommended to
            not provide partyRoleIdentified in case party is provided, and to not provide
            resourceRoleIdentified in case resource is provided.
          properties:
            nickname:
              type: string
              description: >-
                Nickname associated to this digital identity (like Juanito17 or the QuebecMoose
                etc...).
            state:
              type: string
              description: >-
                Represents the current lifecycle status of the digital identity, such as Active
                (Represents a valid and currently accessible digital identity. Users with an active
                status can log in, access resources, and perform authorized actions.), Inactive
                (Indicates that a digital identity is temporarily disabled or not in use. Users with
                an inactive status cannot log in or access resources until reactivated.), Locked (A
                status triggered by multiple failed login attempts. A locked identity prevents
                further login until an administrator intervenes or a specified time elapses.),
                Suspended (Denotes a temporary suspension due to policy violations or other reasons.
                Users with a suspended status cannot perform actions until the suspension is
                lifted.), Pending Approval (Refers to newly created identities awaiting approval
                from administrators. These identities are not yet fully active.), Expired (Indicates
                that an identity's validity period has lapsed. Users with an expired status need to
                renew their credentials or revalidate their identity.), Terminated (Represents a
                permanently disabled identity. Users with a “terminated” status no longer have
                access rights.). It reflects whether the identity is valid and can be used for
                authentication or authorization.
              example: Active
            validFor:
              $ref: '#/components/schemas/TimePeriod'
            credential:
              type: array
              description: >-
                A list of credential/authentification method that are used for this digital
                identity.
              items:
                $ref: '#/components/schemas/CredentialRefOrValue'
            relatedContactMedium:
              type: array
              description: >-
                List of digital identity related contact mediums, such as digital-id-recovery-email,
                digital-id-recovery-phone, digital-id-2nd-factor-email, digital-id-2nd-factor-phone.
              items:
                $ref: '#/components/schemas/RelatedContactMedium'
            attachment:
              type: array
              description: >-
                List of attachment associated with this digital identity. Could be use to link a
                cute cat or moose picture to a digital identity for example.
              items:
                $ref: '#/components/schemas/AttachmentRefOrValue'
            individualIdentified:
              $ref: '#/components/schemas/IndividualRef'
            partyRoleIdentified:
              type: array
              description: Related Party/PartyRole(s) who are identified by this digital identity.
              items:
                $ref: '#/components/schemas/RelatedSecurityPrincipalRef'
            resourceIdentified:
              $ref: '#/components/schemas/ResourceRef'
            resourceRoleIdentified:
              type: array
              description: Related Resource/ResourceRole(s) who are identified by this digital identity.
              items:
                $ref: '#/components/schemas/RelatedSecurityPrincipalRef'
            relatedSecurityPrincipal:
              type: array
              description: >-
                Security principal who have an interest in this digital identity (like the
                organization in charge of providing identity). This is NOT the party identified by
                this digital identity.
              items:
                $ref: '#/components/schemas/RelatedSecurityPrincipalRef'
            creationDate:
              type: string
              format: date-time
              description: Date and time of the Digital Identity creation (timestamp)
            lastUpdate:
              type: string
              format: date-time
              description: Date and time of the Digital Identity last update (timestamp)
      discriminator:
