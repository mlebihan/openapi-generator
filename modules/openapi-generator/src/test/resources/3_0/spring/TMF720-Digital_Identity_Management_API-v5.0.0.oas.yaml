openapi: 3.0.1
info:
  title: Digital Identity Management API
  description: >-
    ## TMF720 - Digital Identity Management API


    Digital Identity Management API enables the creation, management, and verification of digital
    identities for individuals, resources, and specific roles. Each identity can be associated with
    multiple authentication methods (such as passwords, biometrics, and tokens) and contact
    information to facilitate secure access and recovery.
  version: 5.0.0
  x-generation-tooling-version: v8.5.8
  x-generation-data-model-version: unknown
servers:
  - url: '{apiRoot}/tmf-api/digitalIdentityManagement/v5/'
    variables:
      apiRoot:
        default: 'https://serverRoot'
        enum:
          - 'https://serverRoot'
tags:
  - name: digitalIdentity
    description: Operations for DigitalIdentity Resource
  - name: checkCredential
    description: Operations for CheckCredential Resource
  - name: credential
    description: Operations for Credential Resource
  - name: notification listener
    description: Notifications for Resource Lifecycle and event notifications
  - name: events subscription
    description: Endpoints to register and terminate an Event Listener
