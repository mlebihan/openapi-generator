    DongleCredential:
      allOf:
        - $ref: '#/components/schemas/Credential'
        - type: object
          description: >-
            DongleCredential uses a hardware (dongle) that connects to a port on another device to
            identify / authenticate. In some cases an additional password might be required and
            checked on the dongle.
          properties:
            securityKeyId:
              type: string
              description: >-
                A security key identifier, also known as the credential ID, is a unique identifier
                associated with a specific security key. It is generated during the enrollment
                process when a security key is registered with a service or platform. The security
                key identifier is used to identify and authenticate the security key during
                subsequent login attempts. It serves as a reference to the corresponding
                cryptographic key pair stored securely within the security key.
            securityKeyType:
              type: string
              description: >-
                The security key type refers to the classification or category of a security key
                based on its underlying technology or functionality. Examples: USB security key, NFC
                security key.
            securityKeyProvider:
              type: string
              description: >-
                A security key provider refers to an entity, such as a manufacturer, vendor, or
                service provider, that supplies or offers security keys to end-users or
                organizations. These providers may develop and produce the physical security key
                devices or provide the associated software, services, and infrastructure necessary
                for their usage. Security key providers play a crucial role in ensuring the
                availability, quality, and security of the security keys and associated components,
                including firmware updates, key management systems, and authentication protocols.
                They may also offer additional services like customer support, integration
                assistance, and compliance with industry standards.
