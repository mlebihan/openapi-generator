                '@type': icm:Intent
                icm:intentOwner: idan:Salesforce
                icm:hasExpectation:
                  idan:Delivery_service:
                    '@type': icm:DeliveryExpectation
                    icm:target: _:service
                    icm:params:
                      icm:targetDescription: cat:EventWirelessAccess
