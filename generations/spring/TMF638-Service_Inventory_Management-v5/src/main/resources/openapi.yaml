    Service_FVO:
      allOf:
      - $ref: "#/components/schemas/Entity"
      - description: "Service is a base class for defining the Service hierarchy.\
          \ All Services are characterized as either being possibly visible and usable\
          \ by a Customer or not. This gives rise to the two subclasses of Service:\
          \ CustomerFacingService and ResourceFacingService."
        properties:
          description:
            description: Free-text description of the service
            type: string
          isServiceEnabled:
            description: "If FALSE and hasStarted is FALSE, this particular Service\
              \ has NOT been enabled for use - if FALSE and hasStarted is TRUE then\
              \ the service has failed "
            type: boolean
          hasStarted:
            description: "If TRUE, this Service has already been started"
            type: boolean
          startMode:
            description: "This attribute is an enumerated integer that indicates how\
              \ the Service is started, such as: 0: Unknown; 1: Automatically by the\
              \ managed environment; 2: Automatically by the owning device; 3: Manually\
              \ by the Provider of the Service; 4: Manually by a Customer of the Provider;\
              \ 5: Any of the above"
            type: string
          isStateful:
            description: "If TRUE, this Service can be changed without affecting any\
              \ other services"
            type: boolean
          startDate:
            description: Date when the service starts
            format: date-time
            type: string
          endDate:
            description: Date when the service ends
            format: date-time
            type: string
          serviceOrderItem:
            description: A list of service order items related to this service
            items:
              $ref: "#/components/schemas/RelatedServiceOrderItem"
            type: array
          note:
            description: A list of notes made on this service
            items:
              $ref: "#/components/schemas/Note"
            type: array
          serviceType:
            description: Business type of the service
            type: string
          isBundle:
            description: "If true, the service is a ServiceBundle which regroup a\
              \ service hierachy. If false, the service is a 'atomic' service (hierachy\
              \ leaf)."
            type: boolean
          name:
            description: Name of the service
            type: string
          category:
            description: Is it a customer facing or resource facing service
            type: string
          feature:
            description: 'A list of feature associated with this service '
            items:
              $ref: "#/components/schemas/Feature_FVO"
            type: array
          relatedEntity:
            description: A list of related entities in relationship with this service
            items:
              $ref: "#/components/schemas/RelatedEntityRefOrValue_FVO"
            type: array
          externalIdentifier:
            description: A list of external identifiers assoicated with this service
            items:
              $ref: "#/components/schemas/ExternalIdentifier_FVO"
            type: array
          serviceCharacteristic:
            description: "A list of characteristics that characterize this service\
              \ (ServiceCharacteristic [*]) "
            items:
              $ref: "#/components/schemas/Characteristic_FVO"
            type: array
          serviceRelationship:
            description: "A list of service relationships (ServiceRelationship [*]).\
              \ Describes links with other service(s) in the inventory."
            items:
              $ref: "#/components/schemas/ServiceRelationship_FVO"
            type: array
          supportingService:
            description: "A list of supporting services (SupportingService [*]). A\
              \ collection of services that support this service (bundling, link CFS\
              \ to RFS)"
            items:
              $ref: "#/components/schemas/ServiceRefOrValue_FVO"
            type: array
          supportingResource:
            description: "A list of supporting resources (SupportingResource [*]).Note:\
              \ only Service of type RFS can be associated with Resources"
            items:
              $ref: "#/components/schemas/ResourceRef"
            type: array
          relatedParty:
            description: "A list of related party references (RelatedParty [*]). A\
              \ related party defines party or party role linked to a specific entity"
            items:
              $ref: "#/components/schemas/RelatedPartyRefOrPartyRoleRef_FVO"
            type: array
          place:
            description: "A list of places (Place [*]). Used to define a place useful\
              \ for the service (for example a geographical place whre the service\
              \ is installed)"
            items:
              $ref: "#/components/schemas/RelatedPlaceRefOrValue_FVO"
            type: array
          state:
            $ref: "#/components/schemas/ServiceStateType"
          operatingStatus:
            $ref: "#/components/schemas/ServiceOperatingStatusType"
          operatingStatusContextUpdate:
            $ref: "#/components/schemas/ContextUpdate_FVO"
          serviceSpecification:
            $ref: "#/components/schemas/ServiceSpecificationRef"
          serviceDate:
            description: Date when the service was created (whatever its status).
            type: string
          intent:
            $ref: "#/components/schemas/IntentRefOrValue_FVO"
        required:
        - serviceSpecification
        - state
        type: object
      discriminator:
        mapping:
          Service: "#/components/schemas/Service_FVO"
        propertyName: '@type'
