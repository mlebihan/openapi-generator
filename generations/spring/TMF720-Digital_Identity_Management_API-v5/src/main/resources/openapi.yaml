    Credential:
      allOf:
      - $ref: "#/components/schemas/Entity"
      - description: "A Credential is a pure-virtual super-class that defines a specific\
          \ credential such as Biometric Credential, Dongle Credential, Login Password\
          \ Credential, Network Credential and Token Credential with all details associated.\
          \ Use the @type attribute to specify the concrete type in the API calls."
        properties:
          state:
            description: "Indicates the current status of the credential, such as\
              \ whether it is Active (The credential is currently active and can be\
              \ used for authentication.), Inactive (The credential is inactive and\
              \ cannot be used for authentication. This status might occur if the\
              \ user requested to deactivate the credential temporarily), Expired\
              \ (The credential has passed its expiration date and cannot be used\
              \ for authentication. Users may need to renew or update their credential\
              \ to regain access.), Locked (The credential has been temporarily locked\
              \ due to multiple failed authentication attempts or security policy\
              \ violations. This status prevents the credential from being used until\
              \ it's unlocked by an administrator or through a predefined process.),\
              \ Revoked (The credential has been permanently revoked, usually due\
              \ to security concerns or policy violations. Once revoked, the credential\
              \ cannot be used for authentication and may require additional actions\
              \ to reinstate.) Pending (The credential is awaiting approval or activation.\
              \ This status is common for newly created credentials that require administrative\
              \ review or user verification before becoming active.), Suspended )The\
              \ credential has been temporarily suspended, often due to a security\
              \ investigation or compliance issue. While suspended, the credential\
              \ cannot be used for authentication until the suspension is lifted.),\
              \ Disabled (Similar to inactive, this status indicates that the credential\
              \ is currently disabled and cannot be used for authentication. However,\
              \ unlike inactive, disabled status may imply a more permanent state\
              \ or administrative action.), Unverified (The credential has been created\
              \ but not yet verified. Users may need to complete additional steps\
              \ to verify their identity before the credential becomes active.), Compromised\
              \ (The credential has been compromised or suspected of being compromised.\
              \ This status is used to indicate potential security breaches, and immediate\
              \ action is required to mitigate risks, such as resetting the credential\
              \ or investigating further). This property determines if the credential\
              \ is valid and trustworthy at the time of verification."
            example: Active
            type: string
          validFor:
            $ref: "#/components/schemas/TimePeriod"
          trustLevel:
            description: A level of assurance associated with this credential - this
              could be used to limit/allow specific permission based on this trust
              level.
            example: Low Trust Level (Level 1)
            type: string
          relatedContactMedium:
            description: "List of credential related contact mediums, such as credential-login-alias-email,\
              \ credential-login-alias-phone."
            items:
              $ref: "#/components/schemas/RelatedContactMedium"
            type: array
