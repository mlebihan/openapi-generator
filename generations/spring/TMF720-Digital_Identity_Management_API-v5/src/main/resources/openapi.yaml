    ## TMF720 - Digital Identity Management API

    Digital Identity Management API enables the creation, management, and verification of digital identities for individuals, resources, and specific roles. Each identity can be associated with multiple authentication methods (such as passwords, biometrics, and tokens) and contact information to facilitate secure access and recovery.
