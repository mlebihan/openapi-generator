    GeographicAddress:
      allOf:
      - $ref: "#/components/schemas/Place"
      - description: |-
          Structured textual way of describing how to find a Property in an urban area (country properties are often defined differently).
          Note : Address corresponds to SID UrbanPropertyAddress
        properties:
          city:
            description: City that the address is in
            type: string
          country:
            description: Country that the address is in
            type: string
          locality:
            description: "An area of defined or undefined boundaries within a local\
              \ authority or other legislatively defined area, usually rural or semi\
              \ rural in nature. [ANZLIC-STREET], or a suburb, a bounded locality\
              \ within a city, town or shire principally of urban character [ANZLICSTREET]"
            type: string
          postcode:
            description: "descriptor for a postal delivery area, used to speed and\
              \ simplify the delivery of mail (also know as zipcode)"
            type: string
          stateOrProvince:
            description: the State or Province that the address is in
            type: string
          streetName:
            description: Name of the street or other street type
            type: string
          streetNr:
            description: Number identifying a specific property on a public street.
              It may be combined with streetNrLast for ranged addresses
            type: string
          streetNrLast:
            description: Last number in a range of street numbers allocated to a property
            type: string
          streetNrLastSuffix:
            description: Last street number suffix for a ranged address
            type: string
          streetNrSuffix:
            description: the first street number suffix
            type: string
          streetSuffix:
            description: A modifier denoting a relative direction
            type: string
          streetType:
            description: "alley, avenue, boulevard, brae, crescent, drive, highway,\
              \ lane, terrace, parade, place, tarn, way, wharf "
            type: string
          countryCode:
            description: "Country codes are short alphabetic or numeric geographical\
              \ codes (geocodes) developed to represent countries and dependent areas,\
              \ for use in data processing and communications. Several different systems\
              \ have been developed to do this. The term country code frequently refers\
              \ to ISO 3166-1 alpha-2 or international dialing codes, the E.164 country\
              \ calling codes."
